<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>طلب رول | الهلال الأحمر</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="leave2.css"/>
<link rel="stylesheet" href="role_request.css"/>
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="navbar-brand">
    <div class="logo-icon"><svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2"/><path d="M20 10L20 30M10 20L30 20" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg></div>
    <span class="brand-title">شؤون الهلال الأحمر</span>
  </div>
  <div class="navbar-actions">
    <button id="theme-toggle" class="theme-btn">
      <span class="theme-icon dark-icon">🌙</span><span class="theme-icon light-icon">☀️</span>
      <span class="theme-label dark-label">الوضع الفاتح</span><span class="theme-label light-label">الوضع الداكن</span>
    </button>
  </div>
</header>

<!-- WRAPPER -->
<main class="lv-wrapper">

  <!-- FORM CARD -->
  <div class="lv-card">

    <!-- Header -->
    <div class="lv-card-header rr-header">
      <div class="lv-header-right">
        <a href="admin.html" class="lv-back">
          <svg viewBox="0 0 20 20" fill="none"><path d="M12 5l5 5-5 5M5 10h12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          رجوع للقائمة
        </a>
      </div>
      <div class="lv-header-center">
        <span class="lv-header-icon">🎖️</span>
        <h1 class="lv-header-title">نموذج طلب رول</h1>
      </div>
      <div class="lv-header-left"></div>
    </div>

    <!-- Row 1: ID الشخص -->
    <div class="lv-fields-row">
      <div class="lv-field">
        <label class="lv-label"><span class="lv-licon">🆔</span> ID الشخص (Discord ID)</label>
        <input id="person-id" type="text" class="lv-input" placeholder="معرّف الشخص في ديسكورد"/>
      </div>
    </div>

    <!-- Row 2: نوع الطلب -->
    <div class="lv-fields-row">
      <div class="lv-field">
        <label class="lv-label"><span class="lv-licon">📌</span> نوع الطلب</label>
        <select id="request-type" class="lv-input rr-select" onchange="onTypeChange()">
          <option value="">— اختر نوع الطلب —</option>
          <option value="1">إزالة رولات الهلال + الإسم + منع توظيف 14 يوم</option>
          <option value="2">إزالة رولات الهلال + الإسم + منع توظيف 7 أيام</option>
          <option value="3">إزالة رولات الهلال الأحمر + إزالة الإسم</option>
          <option value="4">إضافة رول إجازة وظيفية</option>
          <option value="5">إزالة رول إجازة وظيفية</option>
        </select>
      </div>
    </div>

    <!-- Row 3: وذلك بسبب (conditional) -->
    <div class="lv-fields-row lv-fields-row2" id="reason-row" style="display:none;">
      <div class="lv-field">
        <label class="lv-label"><span class="lv-licon">📝</span> وذلك بسبب</label>

        <!-- Dropdown reason (types 1, 3) -->
        <select id="reason-select" class="lv-input rr-select" style="display:none;">
          <option value="">— اختر السبب —</option>
        </select>

        <!-- Auto reason (types 2, 4, 5) -->
        <div id="reason-auto" class="rr-auto-reason" style="display:none;"></div>
      </div>
    </div>

    <!-- Actions -->
    <div class="lv-actions">
      <button class="lv-btn lv-btn-issue" id="btn-issue" onclick="issueRole()">
        <span>🖨️</span><span>إصدار الصادر</span>
      </button>
      <button class="lv-btn lv-btn-copy" id="btn-copy" onclick="copyRole()" disabled>
        <span>📋</span><span>نسخ الصادر</span>
      </button>
    </div>

    <div class="lv-error" id="lv-error"></div>
  </div><!-- /lv-card -->

  <!-- OUTPUT CARD -->
  <div class="lv-output-card" id="lv-output-card">
    <div class="lv-output-header">
      <span>📤 الصادر الناتج</span>
      <button class="lv-output-copy-btn" onclick="copyRole()">📋 نسخ الصادر</button>
    </div>
    <pre class="lv-output-text" id="lv-output-text"></pre>
  </div>

</main>

<footer class="footer" style="margin-top:auto;">
  <div class="footer-inner"><p class="footer-text">© 2026 بوابة شؤون الهلال الأحمر</p></div>
</footer>

<script src="app.js"></script>
<script src="role_request.js"></script>
</body>
</html>
